name: Scrape Okeechobee County
on:
  schedule:
    - cron: '5 */8 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: okeechobee
      script: counties/okeechobee/runner.py
      args: "--days-back 7"
      needs_xvfb: false
    secrets: inherit
