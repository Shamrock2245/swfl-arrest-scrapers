name: Scrape Manatee County
on:
  schedule:
    - cron: '35 7,13,19,1 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: manatee
      script: python_scrapers/scrapers/run_manatee.py
      args: "--days-back 21"
      needs_xvfb: true
    secrets: inherit
