name: Scrape Gilchrist County
on:
  schedule:
    - cron: '20 */6 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: gilchrist
      script: counties/gilchrist/runner.py
      args: "--days-back 7"
      needs_xvfb: false
    secrets: inherit
