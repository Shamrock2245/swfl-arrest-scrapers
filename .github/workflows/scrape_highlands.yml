name: Scrape Highlands County
on:
  schedule:
    - cron: '5 9,15,21,3 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: highlands
      script: counties/highlands/runner.py
      args: "--days-back 7"
      needs_xvfb: true
    secrets: inherit
