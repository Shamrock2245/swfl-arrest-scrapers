name: Scrape Washington County
on:
  schedule:
    - cron: '45 */8 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: washington
      script: counties/washington/runner.py
      args: "--days-back 7"
      needs_xvfb: false
    secrets: inherit
