name: Scrape Osceola County
on:
  schedule:
    - cron: '35 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: osceola
      script: python_scrapers/scrapers/run_osceola.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
