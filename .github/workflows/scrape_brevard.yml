name: Scrape Brevard County
on:
  schedule:
    - cron: '15 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: brevard
      script: counties/brevard/runner.py
      args: "--days-back 7"
      needs_xvfb: false
    secrets: inherit
