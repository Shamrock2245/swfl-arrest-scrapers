name: Scrape Brevard County
on:
  schedule:
    - cron: '30 9,15,21,3 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: brevard
      script: counties/brevard/runner.py
      args: "--days-back 7"
      needs_xvfb: true
    secrets: inherit
