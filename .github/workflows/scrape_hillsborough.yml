name: Scrape Hillsborough County
on:
  schedule:
    - cron: '30 7,13,19,1 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: hillsborough
      script: python_scrapers/scrapers/run_hillsborough.py
      args: "1"
      needs_xvfb: true
    secrets: inherit
