name: Scrape Hillsborough County

on:
  schedule:
    - cron: '10 6,12,18,0 * * *'
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days back to scrape'
        required: false
        default: '3'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
      GOOGLE_SERVICE_ACCOUNT_KEY_PATH: creds/service-account-key.json
      HCSO_EMAIL: ${{ secrets.HCSO_EMAIL }}
      HCSO_PASSWORD: ${{ secrets.HCSO_PASSWORD }}
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            google-chrome-stable xvfb

      - name: Install Python deps
        run: pip install -r python_scrapers/requirements.txt

      - name: Write credentials
        run: |
          mkdir -p creds
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' > creds/service-account-key.json

      - name: Run scraper
        run: |
          DAYS="${{ github.event.inputs.days_back || '3' }}"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 python_scrapers/scrapers/run_hillsborough.py --days-back $DAYS

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d '{"text":"\u274c *Hillsborough* scraper failed — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"}'
