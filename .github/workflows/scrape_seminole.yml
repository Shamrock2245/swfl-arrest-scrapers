name: Scrape Seminole County
on:
  schedule:
    - cron: '5 9,15,21,3 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: seminole
      script: python_scrapers/scrapers/run_seminole.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
