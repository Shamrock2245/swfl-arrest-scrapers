name: Scrape Hendry County
on:
  schedule:
    - cron: '30 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: hendry
      script: python_scrapers/scrapers/run_hendry.py
      args: "--days-back 7"
      needs_xvfb: true
    secrets: inherit
