name: Scrape Orange County
on:
  schedule:
    - cron: '15 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: orange
      script: python_scrapers/scrapers/run_orange.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
