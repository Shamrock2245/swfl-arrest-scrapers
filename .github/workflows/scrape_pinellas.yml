name: Scrape Pinellas County
on:
  schedule:
    - cron: '45 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: pinellas
      script: python_scrapers/scrapers/run_pinellas.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
