name: Scrape Pinellas County
on:
  schedule:
    - cron: '55 7,13,19,1 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: pinellas
      script: python_scrapers/scrapers/run_pinellas.py
      args: "7"
      needs_xvfb: true
    secrets: inherit
