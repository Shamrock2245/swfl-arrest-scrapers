name: Scrape Miami-Dade County
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: miami_dade
      script: counties/miami_dade/runner.py
      args: "--days-back 7"
      needs_xvfb: false
    secrets: inherit
