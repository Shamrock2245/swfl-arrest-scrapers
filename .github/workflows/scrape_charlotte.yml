name: Scrape Charlotte County
on:
  schedule:
    - cron: '25 7,13,19,1 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: charlotte
      script: python_scrapers/scrapers/run_charlotte.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
