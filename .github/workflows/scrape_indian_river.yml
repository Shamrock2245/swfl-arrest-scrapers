name: Scrape Indian River County
on:
  schedule:
    - cron: '55 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: indian_river
      script: counties/indian_river/runner.py
      args: "--days-back 3"
      needs_xvfb: false
    secrets: inherit
