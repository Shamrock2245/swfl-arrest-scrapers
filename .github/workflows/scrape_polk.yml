name: Scrape Polk County
on:
  schedule:
    - cron: '55 8,14,20,2 * * *'
  workflow_dispatch:
jobs:
  scrape:
    uses: ./.github/workflows/scrape.yml
    with:
      county: polk
      script: python_scrapers/scrapers/run_polk.py
      args: "--days-back 7 --max-pages 2"
      needs_xvfb: true
    secrets: inherit
