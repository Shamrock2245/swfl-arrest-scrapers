# Sarasota County Config
name: Sarasota
state: FL
enabled: true

scraper:
  platform: revize
  stack: python
  url: "https://cms.revize.com/revize/apps/sarasota/"
  days_back: 1
  max_pages: 30
  headless: true
  date_iteration: true

output:
  sheet_tab: "Sarasota"

schedule:
  cron: "0 */3 * * *"
  github_action: true

notes: |
  DrissionPage scraper with 3-phase approach:
  Phase 1: Date search URL → collect PIN links (paginated)
  Phase 2: PIN pages → resolve to booking detail URLs
  Phase 3: Booking detail pages → extract structured data
  Same Revize CMS family as Charlotte and Manatee.
  Cloudflare managed challenge requires browser automation.
  Status: ✅ Active — Completed 2026-04-03
