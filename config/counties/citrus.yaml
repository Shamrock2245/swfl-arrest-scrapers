# Citrus County Config
name: Citrus
state: FL
enabled: true

scraper:
  platform: pdf
  stack: python
  url: "https://www.sheriffcitrus.org/public_info/recent_arrest.php"
  days_back: 7
  headless: false
  needs_browser: false

output:
  sheet_tab: "Citrus"

schedule:
  cron: "40 */6 * * *"
  github_action: true

notes: |
  Citrus County embeds daily PDF arrest report in iframe.
  Uses pdfplumber to extract text and parse records.
  PDF generated by Nitro Pro 13, typically 20+ pages.
  Requires pdfplumber dependency.
