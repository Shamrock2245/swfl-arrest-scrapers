# Dixie County Config
name: Dixie
state: FL
enabled: true

scraper:
  platform: smartcop
  stack: python
  url: "http://smartcop.dixiecountysheriff.com/smartwebclient/Jail.aspx"
  days_back: 7
  headless: false
  needs_browser: false

output:
  sheet_tab: "Dixie"

schedule:
  cron: "10 */6 * * *"
  github_action: true

notes: |
  SmartCOP/SmartWEB scraper. Uses shared core/smartcop_parser.py.
  SmartCOP standard — small county
  No browser required — pure requests + BeautifulSoup.
